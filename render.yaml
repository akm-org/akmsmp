services:
  - type: web
    name: akmsmp
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAILS
        sync: false
    disk:
      name: akmsmp-data
      mountPath: /var/data
      sizeGB: 1
